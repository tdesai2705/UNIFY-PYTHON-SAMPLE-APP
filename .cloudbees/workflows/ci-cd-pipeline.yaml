apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Install dependencies and run linting
        uses: docker://python:3.9
        shell: sh
        run: |
          pip install -r requirements.txt
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Install dependencies and run tests
        uses: docker://python:3.9
        shell: sh
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest --cov=. --cov-report=xml --cov-report=term

      - name: Install dependencies and build package
        uses: docker://python:3.9
        shell: sh
        run: |
          pip install -r requirements.txt
          pip install build
          python -m build

      - name: Build Docker image with Kaniko
        uses: docker://gcr.io/kaniko-project/executor:latest
        run: |
          --context=/cloudbees/workspace
          --dockerfile=/cloudbees/workspace/Dockerfile
          --destination=unify-python-app:latest
          --no-push
          --tar-path=/cloudbees/workspace/unify-python-app.tar

      - name: Verify Docker image
        uses: docker://alpine:latest
        shell: sh
        run: |
          echo "Checking for built Docker image tar..."
          ls -lh /cloudbees/workspace/unify-python-app.tar || echo "Image tar not found"
          # To push to a registry in future, configure Kaniko with:
          # --destination=yourregistry/unify-python-app:latest
          # --destination=yourregistry/unify-python-app:${CLOUDBEES_SCM_COMMIT}

  deploy:
    needs: build-and-test
    if: cloudbees.scm.branch == 'main'
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Deploy to production
        uses: docker://python:3.9
        shell: sh
        run: |
          echo "Deploying application..."
          # Add your deployment commands here
          # Examples:
          # - Deploy to AWS, GCP, Azure
          # - Push to container registry
          # - Deploy to serverless platform
          echo "Deployment completed successfully!"
